<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Homelab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #21262d;
      --accent:   #4f8ef7;
      --accent2:  #58a6ff;
      --text:     #c9d1d9;
      --text-dim: #6e7681;
      --green:    #3fb950;
      --error:    #f85149;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* LOGIN */
    #login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      background: var(--bg);
      transition: opacity 0.4s ease;
    }

    #login-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .login-header { text-align: center; }

    .login-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #1c2a4a, #1e3a6e);
      border: 1px solid #2d4a7a;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .login-sub {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 0.3rem;
    }

    .input-group { display: flex; flex-direction: column; gap: 0.5rem; }

    .input-group label {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; }

    .input-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 2.6rem 0.7rem 0.9rem;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.1em;
    }

    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }

    .input-wrap input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(248,81,73,0.15);
    }

    .eye-btn {
      position: absolute;
      right: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      display: flex;
      padding: 0.2rem;
      transition: color 0.2s;
    }

    .eye-btn:hover { color: var(--text); }

    .error-msg {
      font-size: 0.75rem;
      color: var(--error);
      font-family: 'JetBrains Mono', monospace;
      min-height: 1.1em;
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .login-btn:hover  { background: var(--accent2); }
    .login-btn:active { transform: scale(0.98); }

    /* DASHBOARD */
    #dashboard {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      min-height: 100vh;
      padding: 3rem 1.5rem 4rem;
      position: relative;
      z-index: 1;
    }

    #dashboard.visible { display: flex; }

    #dashboard::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: -1;
    }

    .dash-header { text-align: center; margin-bottom: 3rem; }

    .dash-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.7rem;
    }

    .dash-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.03em;
    }

    .dash-title span { color: var(--accent); }

    .dash-sub { font-size: 0.85rem; color: var(--text-dim); margin-top: 0.5rem; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--green);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.8rem 1.5rem;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      cursor: pointer;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 50% 0%, rgba(79,142,247,0.1) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(79,142,247,0.15), 0 2px 8px rgba(0,0,0,0.4);
    }

    .card:hover::before { opacity: 1; }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .card-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      margin-top: 0.2rem;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .card-arrow {
      position: absolute;
      right: 1.2rem;
      top: 1.3rem;
      color: var(--text-dim);
      transition: color 0.2s, transform 0.2s;
    }

    .card:hover .card-arrow {
      color: var(--accent);
      transform: translate(3px, -3px);
    }

    .dash-footer {
      margin-top: 3rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
    }

    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr; }
      .login-card { margin: 1rem; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4f8ef7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="login-title">homelab.local</div>
      <div class="login-sub">Accès restreint — authentification requise</div>
    </div>

    <div class="input-group">
      <label for="password">Mot de passe</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="eye-btn" id="toggle-eye" type="button" aria-label="Afficher le mot de passe">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>

    <button class="login-btn" id="login-btn">Connexion</button>
  </div>
</div>

<div id="dashboard">
  <div class="dash-header">
    <div class="dash-eyebrow">// homelab dashboard</div>
    <div class="dash-title">Mon <span>Infrastructure</span></div>
    <div class="dash-sub">Accès centralisé à vos services auto-hébergés</div>
    <div class="status-bar">
      <div class="status-dot"></div>
      Tous les services sont en ligne
    </div>
  </div>
  <div class="card-grid" id="card-grid"></div>
  <div class="dash-footer">homelab.local &nbsp;·&nbsp; services auto-hébergés</div>
</div>

<script>
  // ╔══════════════════════════════════════════════════════════════╗
  // ║              CONFIGURATION — À MODIFIER ICI                 ║
  // ╠══════════════════════════════════════════════════════════════╣
  // ║  Remplacez les URL par celles de vos services.              ║
  // ╚══════════════════════════════════════════════════════════════╝

  const PASSWORD = "Timeo_7948";

  const SERVICES = [
    {
      name:   "Home Assistant",
      label:  "Domotique",
      desc:   "Contrôlez vos équipements, automatisations et scènes de la maison.",
      url:    "https://sfpvldrhbjq88dwlxyijciqy9vqf1gji.ui.nabu.casa",   // ← MODIFIEZ ICI
      color:  "#1c3a5e",
      accent: "#4f8ef7",
      icon: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#4f8ef7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>`
    },
    {
      name:   "Immich",
      label:  "Photos",
      desc:   "Gérez et explorez votre bibliothèque de photos et vidéos personnelles.",
      url:    "https://desktop-2ct2jc9.tail5960ed.ts.net/",   // ← MODIFIEZ ICI
      color:  "#1a3a2a",
      accent: "#3fb950",
      icon: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>`
    },
    {
      name:   "Navidrome",
      label:  "Musique",
      desc:   "Écoutez votre bibliothèque musicale depuis n'importe quel appareil.",
      url:    "https://desktop-2ct2jc9.tail5960ed.ts.net/music/",   // ← MODIFIEZ ICI
      color:  "#3a1a3a",
      accent: "#bc8cff",
      icon: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#bc8cff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
      </svg>`
    }
  ];

  // ╚══════════════════════════════════════════════════════════════╝
  //   Fin de la configuration — ne pas modifier en dessous
  // ╚══════════════════════════════════════════════════════════════╝

  const loginScreen = document.getElementById("login-screen");
  const dashboard   = document.getElementById("dashboard");
  const pwInput     = document.getElementById("password");
  const errorMsg    = document.getElementById("error-msg");
  const loginBtn    = document.getElementById("login-btn");
  const toggleEye   = document.getElementById("toggle-eye");
  const eyeIcon     = document.getElementById("eye-icon");

  if (sessionStorage.getItem("auth") === "ok") showDashboard();

  loginBtn.addEventListener("click", tryLogin);
  pwInput.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });

  toggleEye.addEventListener("click", () => {
    const isPass = pwInput.type === "password";
    pwInput.type = isPass ? "text" : "password";
    eyeIcon.innerHTML = isPass
      ? `<line x1="1" y1="1" x2="23" y2="23"/><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  function tryLogin() {
    if (pwInput.value === PASSWORD) {
      sessionStorage.setItem("auth", "ok");
      loginScreen.classList.add("hidden");
      setTimeout(showDashboard, 400);
      errorMsg.textContent = "";
      pwInput.classList.remove("error");
    } else {
      errorMsg.textContent = "Mot de passe incorrect.";
      pwInput.classList.add("error");
      pwInput.value = "";
      pwInput.focus();
    }
  }

  function showDashboard() {
    loginScreen.classList.add("hidden");
    dashboard.classList.add("visible");
    const grid = document.getElementById("card-grid");
    grid.innerHTML = "";
    SERVICES.forEach(svc => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = svc.url;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.innerHTML = `
        <svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
        </svg>
        <div class="card-icon" style="background:${svc.color}; border:1px solid ${svc.accent}33;">
          ${svc.icon}
        </div>
        <div>
          <div class="card-label">${svc.label}</div>
          <div class="card-name">${svc.name}</div>
          <div class="card-desc">${svc.desc}</div>
        </div>`;
      grid.appendChild(card);
    });
  }
</script>
</body>
</html>
